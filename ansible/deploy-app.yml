---
- name: Deploy CloudSentinel application container
  hosts: app
  become: true

  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Pull the latest application image
      ansible.builtin.command:
        cmd: "docker pull {{ docker_image }}"
      changed_when: true

    - name: Remove existing application container by name
      ansible.builtin.command:
        cmd: "docker rm -f {{ app_container_name }}"
      register: remove_named_container
      failed_when: remove_named_container.rc not in [0, 1]
      changed_when: remove_named_container.rc == 0

    - name: Remove any container already publishing the application port
      ansible.builtin.shell: |
        ids=$(docker ps -aq --filter "publish={{ app_port }}")
        if [ -n "$ids" ]; then
          docker rm -f $ids
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Run the CloudSentinel container
      ansible.builtin.command:
        cmd: "docker run -d --restart unless-stopped --name {{ app_container_name }} -p {{ app_port }}:{{ app_container_port }} {{ docker_image }}"
      changed_when: true
