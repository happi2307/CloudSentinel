---
docker_image: happi2307/devsecops-app
app_container_name: cloudsentinel-app
app_port: 8081
app_container_port: 8080
jenkins_port: 8080
jenkins_packages:
  - fontconfig
  - openjdk-21-jre
  - docker.io
  - curl
  - ca-certificates
  - git
jenkins_repo_key_url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
jenkins_repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
